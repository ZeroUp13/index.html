<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini Battle Royale</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#3c8d40;
    touch-action:none;
}

canvas{
    display:block;
    background:#4caf50;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    font-size:20px;
    text-shadow:2px 2px 4px black;
}

#joystick{
    position:absolute;
    left:40px;
    bottom:40px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(255,255,255,.2);
}

#stick{
    position:absolute;
    width:50px;
    height:50px;
    left:35px;
    top:35px;
    border-radius:50%;
    background:rgba(255,255,255,.7);
}
</style>
</head>
<body>

<div id="hud">
❤️ Vida: <span id="vida">100</span><br>
🎯 Kills: <span id="kills">0</span>
</div>

<canvas id="game"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize",resize);

let player = {
    x:200,
    y:200,
    size:20,
    speed:4,
    hp:100
};

let kills = 0;

const enemies = [];
const bullets = [];

function spawnEnemy(){
    enemies.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:18,
        hp:3
    });
}

for(let i=0;i<10;i++) spawnEnemy();

let moveX=0;
let moveY=0;

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let active=false;

joystick.addEventListener("touchstart",()=>{
    active=true;
});

joystick.addEventListener("touchmove",(e)=>{
    e.preventDefault();

    const rect = joystick.getBoundingClientRect();

    const touch = e.touches[0];

    let x = touch.clientX - rect.left - 60;
    let y = touch.clientY - rect.top - 60;

    const dist = Math.sqrt(x*x+y*y);
    const max=40;

    if(dist>max){
        x=x/dist*max;
        y=y/dist*max;
    }

    stick.style.left=(35+x)+"px";
    stick.style.top=(35+y)+"px";

    moveX=x/max;
    moveY=y/max;
});

joystick.addEventListener("touchend",()=>{
    active=false;
    moveX=0;
    moveY=0;
    stick.style.left="35px";
    stick.style.top="35px";
});

setInterval(()=>{
    if(enemies.length===0) return;

    let nearest=enemies[0];
    let best=999999;

    enemies.forEach(e=>{
        let d=Math.hypot(e.x-player.x,e.y-player.y);
        if(d<best){
            best=d;
            nearest=e;
        }
    });

    let ang=Math.atan2(
        nearest.y-player.y,
        nearest.x-player.x
    );

    bullets.push({
        x:player.x,
        y:player.y,
        dx:Math.cos(ang)*8,
        dy:Math.sin(ang)*8
    });

},250);

function update(){

    player.x+=moveX*player.speed;
    player.y+=moveY*player.speed;

    bullets.forEach((b,bi)=>{

        b.x+=b.dx;
        b.y+=b.dy;

        enemies.forEach((e,ei)=>{

            let d=Math.hypot(
                b.x-e.x,
                b.y-e.y
            );

            if(d<e.size){

                e.hp--;

                bullets.splice(bi,1);

                if(e.hp<=0){
                    enemies.splice(ei,1);
                    kills++;
                    document.getElementById("kills").textContent=kills;

                    spawnEnemy();
                }
            }
        });
    });

    enemies.forEach(e=>{

        let ang=Math.atan2(
            player.y-e.y,
            player.x-e.x
        );

        e.x+=Math.cos(ang)*1.2;
        e.y+=Math.sin(ang)*1.2;

        let d=Math.hypot(
            player.x-e.x,
            player.y-e.y
        );

        if(d<25){
            player.hp-=0.1;
            document.getElementById("vida").textContent=
            Math.floor(player.hp);
        }
    });

    if(player.hp<=0){
        alert("Game Over! Kills: "+kills);
        location.reload();
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fill();

    enemies.forEach(e=>{
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
        ctx.fill();
    });

    bullets.forEach(b=>{
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(b.x,b.y,5,0,Math.PI*2);
        ctx.fill();
    });
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
